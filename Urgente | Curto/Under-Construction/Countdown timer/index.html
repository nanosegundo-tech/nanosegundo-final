<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanosegundo | Under-Construction</title>

    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cloudflare.com">

   <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
    }

    /* Ajustado o clamp para não estourar no mobile */
    h1 {
        font-size: clamp(1.8rem, 5vw, 3rem);
        width: 95%;
        margin: 0 auto 15px auto;
        font-weight: bold;
    }

    .intro-text {
        font-size: 1.1rem;
        max-width: 600px;
        margin: 0 auto 30px auto;
        opacity: 0.9;
        line-height: 1.5;
    }

    .highlight {
        font-weight: bold;
        background: linear-gradient(90deg, #f39200, #a166ab);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Logo ajustada */
    .responsive-logo {
        max-width: 120px;
        height: auto;
        background-color: white;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 30px;
    }

    /* TIMER CORRIGIDO */
    .timer-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-bottom: 40px;
        width: 100%;
    }

    .time-box {
        background-color: #2e7d32; /* Cor verde restaurada */
        padding: 15px;
        border-radius: 8px;
        min-width: 75px;
        flex: 0 1 auto; /* Impede que cresça demais */
    }

    .number { font-size: 1.8rem; font-weight: bold; display: block; }
    .label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.9; }

    /* FORMULÁRIO RESPONSIVO SEM SCROLL */
    .support-box {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        padding: 10px;
    }

    input, .btn-support {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 12px;
        border-radius: 8px;
        display: block;
        box-sizing: border-box;
    }

    input {
        border: 1px solid #ccc;
        background: #f0f0f0;
        color: #333;
    }

    .btn-support {
        background-color: #f39200;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-support:hover { background-color: #d88200; transform: scale(1.02); }

    /* RODAPÉ FIXO NO FUNDO */
    footer {
        width: 100%;
        background-color: #003300;
        padding: 20px;
        margin-top: auto;
        font-size: 12px;
        text-align: center;
    }

    .footer-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 8px;
    }

    footer a {
        color: white;
        text-decoration: none;
        white-space: nowrap;
    }

    .icon-orange { color: #f39200; }
    .icon-wa { color: #25D366; }

    /* AJUSTE EXTRA PARA CELULARES PEQUENOS */
    @media (max-width: 400px) {
        .time-box { min-width: 65px; padding: 10px; }
        .number { font-size: 1.5rem; }
    }
</style>
</head>
<body>

    <main class="main-content">
        <h1>Under-Construction</h1>
        <p class="intro-text">
            Our new website is coming soon! Focusing on <span class="highlight">togetherness</span> and innovation.
        </p>

        <div class="logo-container">
            <!-- Certifique-se que a imagem está na pasta assets/img/ -->
            <img src="assets/img/logo.png" alt="Nanosegundo" class="responsive-logo">
        </div>

        <div class="timer-container">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>

        <div class="support-box">
            <label for="userName"></label><input type="text" id="userName" placeholder="Full Name">
            <label for="userEmail"></label><input type="email" id="userEmail" placeholder="E-mail">
            <button class="btn-support" onclick="sendToEmail()">Contact Support</button>
        </div>
    </main>

    <footer>
        <p>Copyright © 2021-2026 <strong>Nanosegundo</strong> | Transforming algorithms into code. | All Rights Reserved.</p>
        <div class="footer-links">
            <a href="mailto:info@nanosegundo.tech"><i class="fa fa-envelope icon-orange"></i>info@nanosegundo.tech</a>|
            <a href="tel:+27691308594"><i class="fa fa-phone icon-orange"></i>+27 (0) 691308594</a>|
            <a href="https://wa.me" target="_blank"><i class="fab fa-whatsapp icon-wa"></i>+25884 5522955</a>|
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </footer>

    <script>
        // SCRIPT DO TIMER CORRIGIDO
        const countdownDate = new Date("May 20, 2026 00:00:00").getTime();

        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = d < 10 ? "0"+d : d;
            document.getElementById("hours").innerHTML = h < 10 ? "0"+h : h;
            document.getElementById("minutes").innerHTML = m < 10 ? "0"+m : m;
            document.getElementById("seconds").innerHTML = s < 10 ? "0"+s : s;

            if (distance < 0) {
                clearInterval(updateTimer);
                document.querySelector(".timer-container").innerHTML = "WE ARE LIVE!";
            }
        }, 1000);

        // FUNÇÃO DE CONTATO
        function sendToEmail() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            if(name && email) {
                window.location.href = `mailto:info@nanosegundo.tech?subject=Support Request from ${name}&body=Contact: ${email}`;
            } else {
                alert("Please fill in both name and email.");
            }
        }
    </script>
</body>
</html>

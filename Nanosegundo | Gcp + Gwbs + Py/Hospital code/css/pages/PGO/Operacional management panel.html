<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Management Dashboard Stocks & HR</title>
</head>
<body>
     <div class="container">
         <header>
             <h1>Control Panel</h1>
             <nav>Panel | Stock | Employee</nav>
         </header>
         <main>
             <!-- Stock Management -->
             <section class="card">
                 <h2>Stock Management</h2>
                 <div class="stock-item">Product A - Qtd: 20<button>Update</button></div>
                 <div class="Stock-item">Product C - Qtd: 200<button>Update</button></div>
             </section>
             <!-- Employee/Shift Management -->
             <section class="card">
                 <h2>Employee & Shift</h2>
                 <table>
                     <tr><th>Name</th><th>Shift</th><th>Lunch</th><th>Status</th></tr>
                     <tr><td>Zihle</td><td>08h-17h</td><td>12h-16</td><td>Active</td></tr>
                     <tr><td>Thato</td><td>13h-23h</td><td>17h-19h</td><td>Vacation</td></tr>
                 </table>
             </section>
             <!-- Workload -->
             <Section class="card">
                 <h2>Workload (weekly)</h2>
                 <p>Zihle: 30h / 30h</p>
                 <p>Thato: 0h / 30h</p>
             </Section>
         </main>
     </div>
</body>
</html>
